# Compose = great laptop parity for a company stack (slide: "Compose: a company stack").
# Limits in production: single host, weak healing/rollouts → why Kubernetes.
services:
  checkout:
    build: .
    ports:
      - "8080:8080"
    environment:
      SERVICE_NAME: checkout
      ENVIRONMENT: compose-laptop
      WELCOME_MESSAGE: "Acme Shop (Compose)"
      PAYMENTS_URL: http://payments:8080
    depends_on:
      - payments

  payments:
    build: .
    environment:
      SERVICE_NAME: payments
      ENVIRONMENT: compose-laptop
