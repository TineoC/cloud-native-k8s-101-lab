apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-native-101
  namespace: cloud-native-101
  labels:
    app: cloud-native-101
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloud-native-101
  template:
    metadata:
      labels:
        app: cloud-native-101
    spec:
      containers:
        - name: app
          image: cloud-native-101-app:local
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
