apiVersion: v1
kind: Service
metadata:
  name: checkout-external
  namespace: shop
  labels:
    app: checkout
    expose: nodeport
spec:
  # Killercoda has no Gateway API / cloud LB — NodePort is the practical way
  # to reach the app from outside the cluster in this lab.
  type: NodePort
  selector:
    app: checkout
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30080
