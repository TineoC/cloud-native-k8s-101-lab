# REFERENCE ONLY (talk sample) — do not apply on Killercoda.
# This cluster has no Gateway API CRDs / controller. Lab traffic uses NodePort
# (see checkout-nodeport.yaml). Gateway API — role-oriented ingress
# (platform owns Gateway; app owns HTTPRoute).
# Same model as the deck's shop.example.com/checkout sample.
# CRDs required; a controller (Contour/Envoy Gateway/etc.) is needed for live traffic.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: shop-gateway
  namespace: shop
  labels:
    owner: platform-team
spec:
  gatewayClassName: webapp-gw
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: checkout-route
  namespace: shop
  labels:
    owner: app-team
    app: checkout
spec:
  parentRefs:
    - name: shop-gateway
  hostnames:
    - "shop.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /checkout
      backendRefs:
        - name: checkout
          port: 80
